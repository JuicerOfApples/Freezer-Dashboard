<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freezer Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="main-title">Freezer Inventory Dashboard</h1>
        
        <div class="table-container">
            <table id="tracker-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>Item</th>
                        <th></th>
                        <th style="text-align: center;">Count</th>
                        <th style="text-align: center;">Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
        
        <button id="add-new-btn" class="add-row-btn">+ Add New Blank Row</button>
    </div>
    <script type="module" src="script.js"></script>

    <div id="recipe-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeRecipe()">✕</span>
            <h2 id="recipe-title" class="modal-title">Recipe Details</h2>
            
            <div class="table-container">
                <table id="ingredients-table">
                    <thead>
                        <tr>
                            <th>Ingredient</th>
                            <th>Amount</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="ingredients-body">
                    </tbody>
                </table>
            </div>
            
            <button onclick="addIngredient()" class="add-row-btn" style="margin-top: 15px;">+ Add Ingredient</button>
        </div>
    </div>
</body>
</html>
