<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freezer Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="login-container" class="container">
        <h1 class="main-title">Dashboard Access</h1>
        <p style="text-align: center; color: #888; margin-bottom: 20px;">Please enter your ID to access the inventory.</p>
        
        <input type="password" id="id-input" class="name-input" placeholder="Enter ID..." style="text-align: center; margin-bottom: 15px;">
        <button id="login-btn" class="add-row-btn">Unlock</button>
        
        <p id="login-message" style="text-align: center; margin-top: 15px; height: 20px;"></p>
    </div>

    <div id="app-container" class="container" style="display: none;">
        <h1 class="main-title">Freezer Inventory Dashboard</h1>
        
        <div class="table-container">
            <table id="tracker-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>Item</th>
                        <th></th>
                        <th style="text-align: center;">Count</th>
                        <th style="text-align: center;">Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
        
        <button id="add-new-btn" class="add-row-btn">+ Add New Blank Row</button>
    </div>

    <div id="recipe-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-recipe-btn">✕</span>
            <h2 id="recipe-title" class="modal-title">Recipe Details</h2>
            
            <div class="table-container">
                <table id="ingredients-table">
                    <thead>
                        <tr>
                            <th>Ingredient</th>
                            <th>Amount</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="ingredients-body">
                        </tbody>
                </table>
            </div>
            
            <button id="add-ingredient-btn" class="add-row-btn" style="margin-top: 15px;">+ Add Ingredient</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
